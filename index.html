<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>InkLog Ultimate</title>

    <meta
        name="theme-color"
        content="#0f1117">

    <link
        rel="manifest"
        href="manifest.json">

    <link
        rel="stylesheet"
        href="css/style.css">

    <link
        rel="stylesheet"
        href="css/components.css">

    <link
        rel="stylesheet"
        href="css/pages.css">

    <link
        rel="stylesheet"
        href="css/animation.css">

    <link
        rel="stylesheet"
        href="css/dark.css">

    <link
        rel="stylesheet"
        href="css/responsive.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div id="loadingScreen">

    <div class="loadingLogo">

        InkLog

    </div>

    <div class="loadingSpinner"></div>

</div>

<div class="app">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <img
                src="assets/logo/logo.PNG"
                alt="Logo">

            <span>

                InkLog

            </span>

        </div>

        <nav>

            <a
                class="active"
                data-page="home">

                <i class="fa-solid fa-house"></i>

                <span>ホーム</span>

            </a>

            <a
                data-page="battle">

                <i class="fa-solid fa-pencil"></i>

                <span>記録</span>

            </a>

            <a
                data-page="history">

                <i class="fa-solid fa-clock-rotate-left"></i>

                <span>履歴</span>

            </a>

            <a
                data-page="analysis">

                <i class="fa-solid fa-chart-line"></i>

                <span>分析</span>

            </a>

            <a
                data-page="weapon">

                <i class="fa-solid fa-gun"></i>

                <span>ブキ</span>

            </a>

            <a
                data-page="stage">

                <i class="fa-solid fa-map"></i>

                <span>ステージ</span>

            </a>

            <a
                data-page="salmon">

                <i class="fa-solid fa-fish"></i>

                <span>サーモン</span>

            </a>

            <a
                data-page="calendar">

                <i class="fa-solid fa-calendar-days"></i>

                <span>カレンダー</span>

            </a>

            <a
                data-page="settings">

                <i class="fa-solid fa-gear"></i>

                <span>設定</span>

            </a>

        </nav>

    </aside>

    <main>

        <header class="header">

            <div class="headerLeft">

                <h1 id="pageTitle">

                    ホーム

                </h1>

            </div>

            <div class="headerRight">

                <button class="iconButton">

                    <i class="fa-solid fa-magnifying-glass"></i>

                </button>

                <button class="iconButton">

                    <i class="fa-solid fa-bell"></i>

                </button>

                <button class="iconButton">

                    <i class="fa-solid fa-moon"></i>

                </button>

            </div>

        </header>

        <div class="pageContainer">
          <!-- =========================
HOME
========================= -->

<section
    id="home"
    class="page active">

    <div class="dashboardGrid">

        <div class="card heroCard">

            <div class="heroLeft">

                <h2>

                    ようこそ！

                </h2>

                <p>

                    InkLog Ultimateへようこそ。
                    今日の戦績や統計をここから確認できます。

                </p>

            </div>

            <div class="heroRight">

                <img
                    src="assets/logo/logo.png"
                    alt="InkLog">

            </div>

        </div>

        <div class="statsGrid">

            <div class="statCard">

                <span>総試合数</span>

                <strong id="totalBattle">

                    0

                </strong>

            </div>

            <div class="statCard">

                <span>勝率</span>

                <strong id="winRate">

                    0%

                </strong>

            </div>

            <div class="statCard">

                <span>平均K/D</span>

                <strong id="averageKD">

                    0.00

                </strong>

            </div>

            <div class="statCard">

                <span>使用ブキ数</span>

                <strong id="weaponCount">

                    0

                </strong>

            </div>

        </div>

        <div class="card">

            <h3>

                最近の試合

            </h3>

            <div id="recentBattleList">

            </div>

        </div>

    </div>

</section>

<!-- =========================
BATTLE
========================= -->

<section
    id="battle"
    class="page">

    <div class="card">

        <h2>

            戦績を記録

        </h2>

        <div class="formGrid">

            <div class="inputBox">

                <label>

                    ブキ

                </label>

                <select id="weaponSelect">

                </select>

            </div>

            <div class="inputBox">

                <label>

                    ステージ

                </label>

                <select id="stageSelect">

                </select>

            </div>

            <div class="inputBox">

                <label>

                    ルール

                </label>

                <select id="ruleSelect">

                    <option>ナワバリ</option>
                    <option>ガチエリア</option>
                    <option>ガチヤグラ</option>
                    <option>ガチホコ</option>
                    <option>ガチアサリ</option>

                </select>

            </div>

            <div class="inputBox">

                <label>

                    勝敗

                </label>

                <select id="resultSelect">

                    <option value="win">

                        勝ち

                    </option>

                    <option value="lose">

                        負け

                    </option>

                </select>

            </div>

        </div>

    </div>

</section>

<!-- =========================
HISTORY
========================= -->

<section
    id="history"
    class="page">

    <div class="card">

        <div class="toolbar">

            <input
                id="historySearch"
                type="search"
                placeholder="検索">

            <select
                id="historySort">

                <option value="new">

                    新しい順

                </option>

                <option value="old">

                    古い順

                </option>

            </select>

        </div>

    </div>

    <div
        id="historyList"
        class="historyList">

    </div>

</section>
<!-- =========================
ANALYSIS
========================= -->

<section
    id="analysis"
    class="page">

    <div class="dashboardGrid">

        <div class="statsGrid">

            <div class="statCard">

                <span>総勝率</span>

                <strong id="analysisWinRate">

                    0%

                </strong>

            </div>

            <div class="statCard">

                <span>平均K/D</span>

                <strong id="analysisKD">

                    0.00

                </strong>

            </div>

            <div class="statCard">

                <span>平均SP</span>

                <strong id="analysisSP">

                    0.0

                </strong>

            </div>

            <div class="statCard">

                <span>平均塗り</span>

                <strong id="analysisPaint">

                    0p

                </strong>

            </div>

        </div>

        <div class="graphGrid">

            <div class="card">

                <h3>

                    勝率推移

                </h3>

                <canvas
                    id="winChart">

                </canvas>

            </div>

            <div class="card">

                <h3>

                    ブキ使用率

                </h3>

                <canvas
                    id="weaponChart">

                </canvas>

            </div>

        </div>

        <div class="card">

            <h3>

                AI分析

            </h3>

            <div
                id="analysisCards"
                class="analysisCards">

            </div>

        </div>

    </div>

</section>

<!-- =========================
WEAPON
========================= -->

<section
    id="weapon"
    class="page">

    <div class="card">

        <div class="toolbar">

            <input

                id="weaponSearch"

                type="search"

                placeholder="ブキ検索">

            <select

                id="weaponType">

                <option value="all">

                    全ブキ

                </option>

            </select>

        </div>

    </div>

    <div

        id="weaponGrid"

        class="weaponGrid">

    </div>

</section>

<!-- =========================
WEAPON DETAIL
========================= -->

<section
    id="weaponDetail"
    class="page">

    <div class="pageGrid">

        <div class="leftColumn">

            <div class="card">

                <div class="weaponProfile">

                    <img

                        id="weaponImage"

                        src=""

                        alt="Weapon">

                    <h2

                        id="weaponName">

                    </h2>

                    <span

                        id="weaponClass">

                    </span>

                </div>

            </div>

        </div>

        <div class="rightColumn">

            <div class="statsGrid">

                <div class="statCard">

                    <span>勝率</span>

                    <strong id="weaponWinRate">

                        0%

                    </strong>

                </div>

                <div class="statCard">

                    <span>K/D</span>

                    <strong id="weaponKD">

                        0.00

                    </strong>

                </div>

                <div class="statCard">

                    <span>使用回数</span>

                    <strong id="weaponBattle">

                        0

                    </strong>

                </div>

                <div class="statCard">

                    <span>平均塗り</span>

                    <strong id="weaponPaint">

                        0p

                    </strong>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- =========================
STAGE
========================= -->

<section
    id="stage"
    class="page">

    <div class="card">

        <div class="toolbar">

            <input

                id="stageSearch"

                type="search"

                placeholder="ステージ検索">

        </div>

    </div>

    <div

        id="stageGrid"

        class="stageGrid">

    </div>

</section>

<!-- =========================
STAGE DETAIL
========================= -->

<section
    id="stageDetail"
    class="page">

    <div class="pageGrid">

        <div class="leftColumn">

            <div class="card">

                <div class="stageProfile">

                    <img

                        id="stageImage"

                        src=""

                        alt="Stage">

                    <h2

                        id="stageName">

                    </h2>

                </div>

            </div>

        </div>

        <div class="rightColumn">

            <div class="statsGrid">

                <div class="statCard">

                    <span>勝率</span>

                    <strong id="stageWinRate">

                        0%

                    </strong>

                </div>

                <div class="statCard">

                    <span>K/D</span>

                    <strong id="stageKD">

                        0.00

                    </strong>

                </div>

                <div class="statCard">

                    <span>試合数</span>

                    <strong id="stageBattle">

                        0

                    </strong>

                </div>

                <div class="statCard">

                    <span>平均塗り</span>

                    <strong id="stagePaint">

                        0p

                    </strong>

                </div>

            </div>

        </div>

    </div>

</section>
<!-- =========================
SALMON RUN
========================= -->

<section
    id="salmon"
    class="page">

    <div class="dashboardGrid">

        <div class="card">

            <h2>

                サーモンラン記録

            </h2>

            <div class="formGrid">

                <div class="inputBox">

                    <label>ステージ</label>

                    <select id="salmonStage"></select>

                </div>

                <div class="inputBox">

                    <label>危険度</label>

                    <input
                        id="hazardLevel"
                        type="number"
                        placeholder="200">

                </div>

                <div class="inputBox">

                    <label>評価</label>

                    <select id="salmonRank">

                        <option>でんせつ</option>
                        <option>たつじん</option>
                        <option>じゅくれん</option>

                    </select>

                </div>

                <div class="inputBox">

                    <label>オカシラ</label>

                    <select id="bossSelect"></select>

                </div>

            </div>

        </div>

        <div class="card">

            <h3>

                最近のバイト

            </h3>

            <div id="salmonHistory">

            </div>

        </div>

    </div>

</section>

<!-- =========================
CALENDAR
========================= -->

<section
    id="calendar"
    class="page">

    <div class="card">

        <div class="toolbar">

            <button
                id="prevMonth"
                class="secondaryButton">

                ←

            </button>

            <h2 id="calendarTitle">

                2026年7月

            </h2>

            <button
                id="nextMonth"
                class="secondaryButton">

                →

            </button>

        </div>

        <div
            id="calendarGrid"
            class="calendarGrid">

        </div>

    </div>

</section>

<!-- =========================
SETTINGS
========================= -->

<section
    id="settings"
    class="page">

    <div class="card">

        <h2>

            設定

        </h2>

        <div class="formGrid">

            <div class="inputBox">

                <label>

                    テーマ

                </label>

                <select id="themeSelect">

                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                    <option value="yellow">Yellow</option>
                    <option value="blue">Blue</option>
                    <option value="pink">Pink</option>

                </select>

            </div>

            <div class="inputBox">

                <label>

                    データ管理

                </label>

                <button
                    id="exportData"
                    class="primaryButton">

                    バックアップ

                </button>

                <button
                    id="importData"
                    class="secondaryButton">

                    復元

                </button>

                <button
                    id="deleteAll"
                    class="dangerButton">

                    全削除

                </button>

            </div>

        </div>

    </div>

</section>

</div>

</main>

</div>

<!-- =========================
IMAGE VIEWER
========================= -->

<div
    id="imageViewer"
    class="modal">

    <img
        id="viewerImage"
        src=""
        alt="Preview">

</div>

<!-- =========================
MODAL
========================= -->

<div
    id="modal"
    class="modal">

    <div class="modalContent">

        <div id="modalBody">

        </div>

    </div>

</div>

<!-- =========================
TOAST
========================= -->

<div
    id="toastContainer">

</div>

<!-- =========================
LOADING
========================= -->

<div
    id="loadingOverlay">

    <div class="loadingSpinner">

    </div>

</div>

<!-- =========================
SCRIPT
========================= -->

<script src="js/router.js"></script>

<script src="js/storage.js"></script>

<script src="js/utils.js"></script>

<script src="js/ui.js"></script>

<script src="js/battle.js"></script>

<script src="js/history.js"></script>

<script src="js/analysis.js"></script>

<script src="js/weapon.js"></script>

<script src="js/stage.js"></script>

<script src="js/salmon.js"></script>

<script src="js/calendar.js"></script>

<script src="js/settings.js"></script>

<script src="js/chart.js"></script>

<script src="js/app.js"></script>

</body>

</html>
